version: '3.9'

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: sparkbill
      POSTGRES_USER: sparkbill_user
      POSTGRES_PASSWORD: sparkbill_pass
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  backend:
    build: ./backend
    command: gunicorn core.wsgi:application --bind 0.0.0.0:8000 --workers 3
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    depends_on:
      - db

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  postgres_data: